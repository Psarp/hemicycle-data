name: Rafraîchir les données Hémicycle

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Générer les données (textes, votes nominatifs, fiches d'acteurs)
        run: python build_all.py
      - name: Publier si modifié
        run: |
          git config user.name "hemicycle-bot"
          git config user.email "actions@github.com"
          git add public/data.json public/votes public/acteurs.json public/acteurs public/groupes.json public/agenda.json
          if git diff --staged --quiet; then
            echo "Aucun changement dans les données."
          else
            git commit -m "Données rafraîchies le $(date -u +%Y-%m-%d)"
            git push
          fi
