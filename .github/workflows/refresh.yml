name: Rafraîchir les données Hémicycle

# Deux déclencheurs :
#  1. schedule  : automatique, tous les jours à 5h00 UTC (7h en France l'été)
#  2. workflow_dispatch : bouton manuel, cliquable depuis l'onglet "Actions"
#     de GitHub — y compris depuis votre téléphone.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

# Autorise le workflow à écrire dans le dépôt (pour committer data.json)
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer data.json
        run: python build_data.py

      - name: Publier data.json si modifié
        run: |
          git config user.name "hemicycle-bot"
          git config user.email "actions@github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "Aucun changement dans les données."
          else
            git commit -m "Données rafraîchies le $(date -u +%Y-%m-%d)"
            git push
          fi
