<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hémicycle — Suivi des textes de l'Assemblée nationale</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f1ea; font-family: system-ui, -apple-system, sans-serif; color: #1a1a2e; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  button { font-family: inherit; }
  a { color: inherit; }
  code { background: #f2efe8; padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
  @media (max-width: 780px) {
    .layout { grid-template-columns: 1fr !important; }
    .cal-col { position: static !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ============================================================
// CONFIG : le data.json est au même endroit que cette page,
// donc chemin relatif — aucun problème de CORS.
// ============================================================
const DATA_URL = "public/data.json";

const GROUPES = {
  RN:{nom:"Rassemblement national",court:"RN",couleur:"#1f3d6b"},
  EPR:{nom:"Ensemble pour la République",court:"EPR",couleur:"#ffc400"},
  LFI:{nom:"La France insoumise",court:"LFI-NFP",couleur:"#cc2b2b"},
  SOC:{nom:"Socialistes et apparentés",court:"SOC",couleur:"#e8568f"},
  DR:{nom:"Droite Républicaine",court:"DR",couleur:"#1d6fb8"},
  ECO:{nom:"Écologiste et social",court:"ECO",couleur:"#3a8a3a"},
  DEM:{nom:"Les Démocrates",court:"DEM",couleur:"#f59e0b"},
  HOR:{nom:"Horizons & indépendants",court:"HOR",couleur:"#5b8db8"},
  GDR:{nom:"Gauche démocrate et républicaine",court:"GDR",couleur:"#b91c1c"},
  LIOT:{nom:"Libertés, Indépendants, Outre-mer et Territoires",court:"LIOT",couleur:"#6b7280"},
  UDR:{nom:"Union des droites pour la République",court:"UDR",couleur:"#243b6b"},
  AUTRE:{nom:"Autres / non inscrits",court:"NI",couleur:"#9ca3af"},
};
const G = (c) => GROUPES[c] || GROUPES.AUTRE;
// Libellé à droite du nom de l'auteur : groupe parlementaire si député, sinon qualité (Premier ministre, Sénateur…)
const auteurLibelle = (t) => t.auteurGroupe ? G(t.auteurGroupe).court : (t.auteurQualite || "");
const auteurCouleur = (t) => t.auteurGroupe ? G(t.auteurGroupe).couleur : "#9ca3af";
const MOIS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const JOURS=["L","M","M","J","V","S","D"];
const ymd=(d)=>{const p=(n)=>String(n).padStart(2,"0");return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());};
const frDate=(iso)=>{const [y,m,d]=iso.split("-").map(Number);return d+" "+MOIS[m-1]+" "+y;};

const navBtn={background:"#f2efe8",border:"1px solid #e2dcd0",borderRadius:8,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#1f3d6b",fontSize:18};

function Pastille({position}){
  const m={pour:["#1a7a3a","● Pour"],contre:["#c0392b","● Contre"],abstention:["#b8860b","● Abstention"]};
  const [c,t]=m[position]||["#888","● "+(position||"—")];
  return <span style={{color:c,fontWeight:600,fontSize:13}}>{t}</span>;
}
function BarreVotes({v}){
  const tot=v.pour+v.contre+v.abstention; if(!tot)return null;
  return <div>
    <div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",background:"#eee"}}>
      {[["pour","#1a7a3a"],["contre","#c0392b"],["abstention","#b8860b"]].map(([k,c])=>v[k]>0?<div key={k} style={{flex:v[k],background:c}}/>:null)}
    </div>
    <div style={{display:"flex",gap:12,marginTop:5,fontSize:11.5,color:"#666",flexWrap:"wrap"}}>
      <span><b style={{color:"#1a7a3a"}}>{v.pour}</b> pour</span><span><b style={{color:"#c0392b"}}>{v.contre}</b> contre</span><span><b style={{color:"#b8860b"}}>{v.abstention}</b> abst.</span>
    </div>
  </div>;
}

function ObjetTexte({texte,num,groupe,apercu=180}){
  const [ouvert,setOuvert]=useState(false);
  if(!texte) return null;
  const court=texte.length>apercu;
  const coupe=court?texte.slice(0,apercu).replace(/\s+\S*$/,"")+"…":texte;
  return <>
    <span style={{fontSize:12.5,color:"#444"}}>{coupe}</span>
    {court&&<button onClick={(e)=>{e.stopPropagation();setOuvert(true);}} style={{marginLeft:6,fontSize:11.5,color:"#1f3d6b",background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0,textDecoration:"underline"}}>voir plus</button>}
    {ouvert&&<div onClick={()=>setOuvert(false)} style={{position:"fixed",inset:0,background:"rgba(20,20,35,0.55)",zIndex:60,display:"flex",justifyContent:"center",alignItems:"flex-start",overflowY:"auto",padding:"40px 16px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fdfcf9",borderRadius:12,maxWidth:640,width:"100%",padding:24,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,gap:12}}>
          <strong style={{fontFamily:"Georgia,serif",fontSize:16}}>Amendement {num}{groupe?" · "+G(groupe).court:""}</strong>
          <button onClick={()=>setOuvert(false)} style={{background:"#f2efe8",border:"1px solid #e2dcd0",borderRadius:8,width:30,height:30,cursor:"pointer",color:"#1f3d6b",fontSize:15}}>✕</button>
        </div>
        <div style={{fontSize:14,lineHeight:1.6,color:"#2a2a2a",whiteSpace:"pre-wrap"}}>{texte}</div>
      </div>
    </div>}
  </>;
}


// ---------- Votes nominatifs d'un texte : qui a voté quoi ----------
function VotesNominatifs({texteRef,onOuvrirActeur}){
  const [ouvert,setOuvert]=useState(false);
  const [etat,setEtat]=useState("idle");
  const [votes,setVotes]=useState([]);
  const [fGroupe,setFGroupe]=useState("");
  const [fPos,setFPos]=useState("");
  const [q,setQ]=useState("");
  const [noms,setNoms]=useState({});

  async function charger(){
    setEtat("load");
    try{
      const [rv,ra]=await Promise.all([
        fetch("public/votes/"+texteRef+".json?t="+Date.now()),
        fetch("public/acteurs.json?t="+Date.now()),
      ]);
      const jv=await rv.json();
      const ja=await ra.json();
      const map={}; (ja.acteurs||[]).forEach(a=>{map[a.acteurRef]=a.nom;});
      setNoms(map); setVotes(jv.votes||[]); setEtat("ok");
    }catch(e){setEtat("err");}
  }
  function toggle(){ if(!ouvert&&etat==="idle")charger(); setOuvert(!ouvert); }

  const groupes=[...new Set(votes.map(v=>v.groupe))].sort();
  const filtres=votes.filter(v=>
    (!fGroupe||v.groupe===fGroupe)&&(!fPos||v.position===fPos)&&
    (!q||(noms[v.acteurRef]||"").toLowerCase().includes(q.toLowerCase()))
  ).sort((a,b)=>(noms[a.acteurRef]||"").localeCompare(noms[b.acteurRef]||""));
  const coulPos={pour:"#1a7a3a",contre:"#c0392b",abstention:"#b8860b","non-votant":"#9ca3af"};
  const sel={fontSize:12.5,padding:"5px 8px",borderRadius:6,border:"1px solid #d8d2c4",background:"#fff"};

  return <div style={{marginTop:12}}>
    <button onClick={toggle} style={{fontSize:13,fontWeight:600,color:"#1f3d6b",background:"#eef1f6",border:"1px solid #d5deec",borderRadius:8,padding:"8px 14px",cursor:"pointer"}}>
      {ouvert?"▼":"▶"} Voir le vote de chaque député
    </button>
    {ouvert&&<div style={{marginTop:12}}>
      {etat==="load"&&<p style={{fontSize:13,color:"#666"}}>Chargement…</p>}
      {etat==="err"&&<p style={{fontSize:13,color:"#c0392b"}}>Votes nominatifs indisponibles pour ce texte.</p>}
      {etat==="ok"&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Chercher un député…" style={{...sel,flex:"1 1 150px"}}/>
          <select value={fGroupe} onChange={e=>setFGroupe(e.target.value)} style={sel}><option value="">Tous groupes</option>{groupes.map(g=><option key={g} value={g}>{G(g).court}</option>)}</select>
          <select value={fPos} onChange={e=>setFPos(e.target.value)} style={sel}><option value="">Toutes positions</option><option value="pour">Pour</option><option value="contre">Contre</option><option value="abstention">Abstention</option><option value="non-votant">Non-votant</option></select>
        </div>
        <div style={{fontSize:11.5,color:"#999",marginBottom:6}}>{filtres.length} député{filtres.length>1?"s":""}</div>
        <div style={{maxHeight:380,overflowY:"auto",border:"1px solid #e6e1d6",borderRadius:8}}>
          {filtres.map((v,i)=><div key={i} onClick={()=>onOuvrirActeur&&onOuvrirActeur(v.acteurRef)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #f3f0e8",cursor:"pointer",fontSize:12.5}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:G(v.groupe).couleur,flexShrink:0}}></span>
            <span style={{flex:1,color:"#1f3d6b",fontWeight:500}}>{noms[v.acteurRef]||v.acteurRef}</span>
            <span style={{color:"#999",fontSize:11.5}}>{G(v.groupe).court}</span>
            <span style={{color:coulPos[v.position],fontWeight:600,minWidth:74,textAlign:"right"}}>{v.position}</span>
            {v.delegation&&<span title="vote par délégation" style={{fontSize:10,color:"#8a8478",border:"1px solid #e2dcd0",borderRadius:4,padding:"1px 4px"}}>procuration</span>}
          </div>)}
        </div>
        <p style={{fontSize:11,color:"#999",marginTop:8,lineHeight:1.5}}>« Non-votant » ne signifie pas absent : la présidence de séance et certains députés ne prennent pas part au vote. « Procuration » = vote émis par délégation.</p>
      </>}
    </div>}
  </div>;
}

// ---------- Fiche d'un acteur (député, ministre, sénateur) ----------
function FicheActeur({acteurRef,onClose,onOuvrirTexte,onOuvrirGroupe}){
  const [etat,setEtat]=useState("load");
  const [f,setF]=useState(null);
  useEffect(()=>{(async()=>{
    setEtat("load");
    try{
      const r=await fetch("public/acteurs/"+acteurRef+".json?t="+Date.now());
      setF(await r.json()); setEtat("ok");
    }catch(e){setEtat("err");}
  })();},[acteurRef]);

  const Section=({titre,children})=><section style={{marginTop:24}}><h3 style={{fontFamily:"Georgia,serif",fontSize:16,color:"#1a1a2e",margin:"0 0 12px",paddingBottom:7,borderBottom:"2px solid #1f3d6b"}}>{titre}</h3>{children}</section>;
  const coulPos={pour:"#1a7a3a",contre:"#c0392b",abstention:"#b8860b","non-votant":"#9ca3af"};

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,20,35,0.55)",zIndex:55,display:"flex",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fdfcf9",borderRadius:14,maxWidth:720,width:"100%",height:"fit-content",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",overflow:"hidden"}}>
      <div style={{background:"linear-gradient(135deg,#1f3d6b 0%,#16294a 100%)",color:"#fff",padding:"20px 26px",position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,width:30,height:30,color:"#fff",cursor:"pointer",fontSize:15}}>✕</button>
        {etat==="ok"&&f?<>
          <h2 style={{fontFamily:"Georgia,serif",fontSize:22,paddingRight:40}}>{f.nom}</h2>
          <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {f.groupe&&<button onClick={()=>onOuvrirGroupe&&onOuvrirGroupe(f.groupe)} style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:13,background:"rgba(255,255,255,0.12)",padding:"4px 10px",borderRadius:6,border:"none",color:"#fff",cursor:"pointer",fontFamily:"inherit"}}>
              <span style={{width:9,height:9,borderRadius:"50%",background:G(f.groupe).couleur}}></span>{G(f.groupe).nom} ↗
            </button>}
            {f.circo&&<span style={{fontSize:12.5,background:"rgba(255,255,255,0.12)",padding:"4px 10px",borderRadius:6}}>
              {f.circo.dep}{f.circo.numCirco?` · ${f.circo.numCirco}ᵉ circonscription`:""}
            </span>}
            {f.ministere&&<span style={{fontSize:12.5,background:"rgba(255,196,0,0.25)",color:"#ffc400",padding:"4px 10px",borderRadius:6,fontWeight:600}}>{f.ministere}</span>}
          </div>
        </>:<h2 style={{fontFamily:"Georgia,serif",fontSize:20}}>Chargement…</h2>}
      </div>
      <div style={{padding:"6px 26px 30px"}}>
        {etat==="load"&&<p style={{padding:"30px 0",textAlign:"center",color:"#666"}}>Chargement de la fiche…</p>}
        {etat==="err"&&<p style={{padding:"30px 0",textAlign:"center",color:"#c0392b"}}>Fiche indisponible.</p>}
        {etat==="ok"&&f&&<>
          <Section titre="Ses votes">
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[["Pour",f.compte.pour,"#1a7a3a"],["Contre",f.compte.contre,"#c0392b"],["Abstention",f.compte.abstention,"#b8860b"],["Non-votant",f.compte["non-votant"],"#9ca3af"]].map(([n,v,c],i)=>
                <div key={i} style={{flex:"1 1 90px",textAlign:"center",padding:"10px 6px",background:"#fff",border:"1px solid #e2dcd0",borderRadius:8}}>
                  <div style={{fontSize:20,fontWeight:700,color:c,fontFamily:"Georgia,serif"}}>{v}</div>
                  <div style={{fontSize:11.5,color:"#777"}}>{n}</div>
                </div>)}
            </div>
            <p style={{fontSize:11.5,color:"#999",marginTop:8}}>Sur {f.nbVotes} scrutin{f.nbVotes>1?"s":""} publics de la base{f.parDelegation>0?` · ${f.parDelegation} vote(s) par procuration`:""}.</p>
          </Section>

          {f.textesDeposes&&f.textesDeposes.length>0&&<Section titre={"Textes dont il/elle est l'auteur ("+f.textesDeposes.length+")"}>
            {f.textesDeposes.map((t,i)=><button key={i} onClick={()=>onOuvrirTexte&&onOuvrirTexte(t.ref)} style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:"1px solid #e6e1d6",borderRadius:8,padding:"9px 12px",marginBottom:7,cursor:"pointer"}}>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:3}}>
                <span style={{fontSize:10.5,background:"#eef1f6",color:"#1f3d6b",padding:"1px 7px",borderRadius:4,fontWeight:600}}>{t.type}</span>
                <span style={{fontSize:10.5,padding:"1px 7px",borderRadius:4,fontWeight:600,background:t.statut==="adopté"?"#e6f4ea":"#fbeaea",color:t.statut==="adopté"?"#1a7a3a":"#c0392b"}}>{t.statut}</span>
                <span style={{fontSize:11,color:"#aaa"}}>{frDate(t.date)}</span>
              </div>
              <div style={{fontSize:13,color:"#1a1a2e"}}>{t.titre}</div>
            </button>)}
          </Section>}

          <Section titre={"Détail de ses votes ("+f.votes.length+")"}>
            <div style={{maxHeight:320,overflowY:"auto",border:"1px solid #e6e1d6",borderRadius:8}}>
              {f.votes.map((v,i)=><div key={i} onClick={()=>onOuvrirTexte&&onOuvrirTexte(v.ref)} style={{display:"flex",gap:10,alignItems:"center",padding:"7px 10px",borderBottom:"1px solid #f3f0e8",cursor:"pointer",fontSize:12.5}}>
                <span style={{color:"#aaa",fontSize:11,minWidth:78}}>{frDate(v.date)}</span>
                <span style={{flex:1,color:"#1f3d6b"}}>{v.titre.slice(0,60)}{v.titre.length>60?"…":""}</span>
                <span style={{color:coulPos[v.position],fontWeight:600,minWidth:70,textAlign:"right"}}>{v.position}</span>
              </div>)}
            </div>
          </Section>
        </>}
      </div>
    </div>
  </div>;
}


// ---------- Fiche d'un groupe parlementaire ----------
function FicheGroupe({code,onClose,onOuvrirTexte,onOuvrirActeur,onOuvrirGroupe}){
  const [etat,setEtat]=useState("load");
  const [f,setF]=useState(null);
  useEffect(()=>{(async()=>{
    setEtat("load");
    try{
      const r=await fetch("public/groupes.json?t="+Date.now());
      const j=await r.json();
      setF((j.groupes||{})[code]||null); setEtat("ok");
    }catch(e){setEtat("err");}
  })();},[code]);

  const Section=({titre,children})=><section style={{marginTop:24}}><h3 style={{fontFamily:"Georgia,serif",fontSize:16,color:"#1a1a2e",margin:"0 0 12px",paddingBottom:7,borderBottom:"2px solid #1f3d6b"}}>{titre}</h3>{children}</section>;
  const g=G(code);
  const totalVotes=f&&f.votes?(f.votes.pour+f.votes.contre+f.votes.abstention):0;
  const prox=f?Object.entries(f.proximite||{}).sort((a,b)=>b[1].taux-a[1].taux):[];

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,20,35,0.55)",zIndex:55,display:"flex",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fdfcf9",borderRadius:14,maxWidth:720,width:"100%",height:"fit-content",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",overflow:"hidden"}}>
      <div style={{background:"linear-gradient(135deg,"+g.couleur+" 0%,#16294a 130%)",color:"#fff",padding:"20px 26px",position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"rgba(255,255,255,0.2)",border:"none",borderRadius:8,width:30,height:30,color:"#fff",cursor:"pointer",fontSize:15}}>✕</button>
        <h2 style={{fontFamily:"Georgia,serif",fontSize:21,paddingRight:40}}>{g.nom}</h2>
        {f&&<div style={{marginTop:8,fontSize:13.5,opacity:0.95}}>
          {f.effectif} député{f.effectif>1?"s":""}
          {f.president&&<> · Président : <button onClick={()=>onOuvrirActeur&&onOuvrirActeur(f.president.acteurRef)} style={{background:"none",border:"none",padding:0,cursor:"pointer",color:"#fff",fontWeight:700,fontSize:13.5,textDecoration:"underline",fontFamily:"inherit"}}>{f.president.nom}</button></>}
        </div>}
      </div>
      <div style={{padding:"6px 26px 30px"}}>
        {etat==="load"&&<p style={{padding:"30px 0",textAlign:"center",color:"#666"}}>Chargement…</p>}
        {(etat==="err"||(etat==="ok"&&!f))&&<p style={{padding:"30px 0",textAlign:"center",color:"#c0392b"}}>Fiche indisponible pour ce groupe.</p>}
        {etat==="ok"&&f&&<>
          <Section titre="Ses votes">
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[["Pour",f.votes.pour,"#1a7a3a"],["Contre",f.votes.contre,"#c0392b"],["Abstention",f.votes.abstention,"#b8860b"]].map(([n,v,c],i)=>
                <div key={i} style={{flex:"1 1 90px",textAlign:"center",padding:"10px 6px",background:"#fff",border:"1px solid #e2dcd0",borderRadius:8}}>
                  <div style={{fontSize:20,fontWeight:700,color:c,fontFamily:"Georgia,serif"}}>{v}</div>
                  <div style={{fontSize:11.5,color:"#777"}}>{n}{totalVotes>0?" · "+Math.round(v/totalVotes*100)+"%":""}</div>
                </div>)}
            </div>
            <p style={{fontSize:11.5,color:"#999",marginTop:8}}>Voix cumulées sur {f.votes.scrutins} scrutin{f.votes.scrutins>1?"s":""} publics.</p>
          </Section>

          {f.cohesion&&f.cohesion.moyenne!==null&&<Section titre="Cohésion interne">
            <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
              <div style={{fontSize:30,fontWeight:700,fontFamily:"Georgia,serif",color:g.couleur}}>{Math.round(f.cohesion.moyenne*100)}%</div>
              <div style={{flex:1,minWidth:200,fontSize:12.5,color:"#666",lineHeight:1.5}}>Part moyenne des membres votant la position majoritaire de leur groupe, sur {f.cohesion.surScrutins} scrutins.</div>
            </div>
            {f.cohesion.fractures&&f.cohesion.fractures.length>0&&<div style={{marginTop:14}}>
              <div style={{fontSize:12.5,fontWeight:600,color:"#555",marginBottom:8}}>Textes qui ont le plus divisé le groupe</div>
              {f.cohesion.fractures.map((x,i)=><button key={i} onClick={()=>onOuvrirTexte&&onOuvrirTexte(x.ref)} style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:"1px solid #e6e1d6",borderLeft:"3px solid #b8860b",borderRadius:"0 8px 8px 0",padding:"8px 12px",marginBottom:6,cursor:"pointer"}}>
                <div style={{fontSize:12.5,color:"#1a1a2e"}}>{x.titre.slice(0,62)}{x.titre.length>62?"…":""}</div>
                <div style={{fontSize:11.5,color:"#888",marginTop:2}}>{Math.round(x.taux*100)}% pour la position majoritaire · {Object.entries(x.detail).map(([k,v])=>k+" "+v).join(" · ")}</div>
              </button>)}
            </div>}
          </Section>}

          {prox.length>0&&<Section titre="Proximité de vote avec les autres groupes">
            {prox.map(([b,v],i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>

// ---------- Page statistiques : constructeur de requêtes ----------
const POSITIONS=["pour","contre","abstention"];

function calculer(textes,cfg){
  // 1. Filtrer les textes
  let sel=textes.filter(t=>
    (!cfg.type||t.type===cfg.type)&&
    (!cfg.auteurGroupe||t.auteurGroupe===cfg.auteurGroupe)&&
    (!cfg.auteurQualite||t.auteurQualite===cfg.auteurQualite)&&
    (!cfg.statut||t.statut===cfg.statut)&&
    (!cfg.annee||t.date.startsWith(cfg.annee))
  );
  if(cfg.compte==="voix") sel=sel.filter(t=>t.votesParGroupe);

  // 2. Clé de regroupement
  const cle=(t,g)=>{
    switch(cfg.groupePar){
      case "auteurGroupe": return t.auteurGroupe||"(sans auteur)";
      case "auteurQualite": return t.auteurQualite||"(inconnue)";
      case "type": return t.type;
      case "statut": return t.statut;
      case "annee": return t.date.slice(0,4);
      case "mois": return t.date.slice(0,7);
      case "groupeVotant": return g;
      default: return "Total";
    }
  };

  const res={};
  const refs={};
  const ajoute=(k,n,t)=>{res[k]=(res[k]||0)+n; if(t){(refs[k]=refs[k]||new Set()).add(t.ref);}};

  if(cfg.compte==="textes"){
    sel.forEach(t=>ajoute(cle(t),1,t));
  }else{
    sel.forEach(t=>{
      Object.entries(t.votesParGroupe).forEach(([g,v])=>{
        if(cfg.groupeVotant&&g!==cfg.groupeVotant) return;
        const n=cfg.position?(v[cfg.position]||0):(v.pour+v.contre+v.abstention);
        if(n>0) ajoute(cle(t,g),n,t);
      });
    });
  }
  const lignes=Object.entries(res).map(([k,v])=>({cle:k,valeur:v,nbTextes:(refs[k]||new Set()).size,
                                                 refs:[...(refs[k]||[])]}))
                                  .sort((a,b)=>b.valeur-a.valeur);
  return {lignes,total:Object.values(res).reduce((a,b)=>a+b,0),nbTextes:sel.length};
}

                    border:"1px solid #e6e1d6",borderLeft:"3px solid "+G(a.groupe).couleur,
                    borderRadius:"0 8px 8px 0",padding:"8px 11px",marginBottom:6,cursor:"pointer"}}>
            <span style={{flex:1}}>
              <span style={{fontSize:13,color:"#1a1a2e",display:"block"}}>{a.nom}</span>
              <span style={{fontSize:11,color:"#888"}}>{G(a.groupe).court}{a.circo&&a.circo.numCirco?` · ${a.circo.numCirco}ᵉ circonscription`:""}</span>
            </span>
            <span style={{fontSize:11,color:"#bbb"}}>→</span>
          </button>)}
        </div>:<div style={{background:"#fdfcf9",borderRadius:14,padding:"28px 18px",border:"1px dashed #d8d2c4",textAlign:"center"}}>
          <div style={{fontSize:26,marginBottom:8}}>🗺</div>
          <div style={{fontSize:14,color:"#666",lineHeight:1.5}}>Choisissez un département pour voir ses députés, puis cliquez sur un nom pour ouvrir sa fiche.</div>
        </div>}

        {/* Gouvernement */}
        <div style={{background:"#fdfcf9",borderRadius:14,padding:18,border:"1px solid #e6e1d6",marginTop:16}}>
          <button onClick={()=>setVoirGouv(!voirGouv)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:"none",border:"none",cursor:"pointer",padding:0}}>
            <h3 style={{fontFamily:"Georgia,serif",fontSize:16,margin:0,color:"#1a1a2e"}}>Gouvernement</h3>
            <span style={{fontSize:12,color:"#888"}}>{gouv.length} membres {voirGouv?"▼":"▶"}</span>
          </button>
          {voirGouv&&<div style={{marginTop:12,maxHeight:320,overflowY:"auto"}}>
            {gouv.map((a,i)=><button key={i} onClick={()=>onOuvrirActeur&&onOuvrirActeur(a.acteurRef)}
              style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:"1px solid #e6e1d6",
                      borderLeft:"3px solid #555",borderRadius:"0 8px 8px 0",padding:"7px 11px",marginBottom:5,cursor:"pointer"}}>
              <span style={{fontSize:12.5,color:"#1a1a2e",display:"block"}}>{a.nom}</span>
              <span style={{fontSize:11,color:"#888"}}>{a.ministere}</span>
            </button>)}
            <p style={{fontSize:11,color:"#999",marginTop:8,lineHeight:1.5}}>Membres du Gouvernement recensés dans l'open data de l'Assemblée. Ils ne votent pas à l'Assemblée mais y portent les projets de loi.</p>
          </div>}
        </div>
      </div>
    </div>}
  </div>;
}


// ---------- Ordre du jour d'une journée de séance ----------
const NATURE_LIB={ODJPR:"Ordre du jour du Gouvernement",ODJAN:"Ordre du jour de l'Assemblée",ODJSN:"Semaine de l'Assemblée"};
function OrdreDuJour({seances,onOuvrirTexte,textesConnus,futur}){
  if(!seances||!seances.length) return null;
  return <div style={{background:"#fdfcf9",borderRadius:14,padding:18,border:"1px solid #e6e1d6",marginTop:16}}>
    <h3 style={{fontFamily:"Georgia,serif",fontSize:16,margin:"0 0 4px"}}>Ordre du jour{futur?" (prévisionnel)":""}</h3>
    <p style={{fontSize:12,color:"#888",margin:"0 0 14px"}}>{seances.length} séance{seances.length>1?"s":""} {futur?"programmée"+(seances.length>1?"s":""):"ce jour-là"}</p>
    {seances.map((s,i)=><div key={i} style={{marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
        <span style={{fontSize:12.5,fontWeight:700,color:"#1f3d6b",background:"#eef1f6",padding:"2px 9px",borderRadius:5}}>
          {s.quantieme?s.quantieme+" séance":"Séance"}{s.heure?" · "+s.heure:""}
        </span>
      </div>
      {s.points.map((p,k)=>{
        const connu=p.dossierRef&&textesConnus&&textesConnus.has(p.dossierRef);
        const Balise=connu?"button":"div";
        return <Balise key={k} onClick={connu?()=>onOuvrirTexte(p.dossierRef):undefined}
          title={connu&&p.lienDeduit?"Lien reconstitué à partir du libellé : l'Assemblée n'a pas renseigné le dossier pour ce point.":undefined}
          style={{display:"block",width:"100%",textAlign:"left",background:"#fff",border:"1px solid #eee",
                  borderLeft:"3px solid "+(p.type==="Questions au Gouvernement"?"#b8860b":(connu?"#1f3d6b":"#ddd")),
                  borderRadius:"0 8px 8px 0",padding:"8px 11px",marginBottom:6,
                  cursor:connu?"pointer":"default",fontFamily:"inherit"}}>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:3}}>
            {p.type&&<span style={{fontSize:10.5,color:"#888",background:"#f4f1ea",padding:"1px 6px",borderRadius:4}}>{p.type}</span>}
            {connu&&<span style={{fontSize:10.5,color:"#1a7a3a"}}>fiche disponible →{p.lienDeduit?" *":""}</span>}
          </div>
          <div style={{fontSize:12.5,color:"#2a2a2a",lineHeight:1.45}}>{p.objet||"(objet non précisé)"}</div>
        </Balise>;
      })}
    </div>)}
    <p style={{fontSize:11,color:"#999",marginTop:4,lineHeight:1.5}}>Ordre du jour officiel des séances publiques. Tous les points ne donnent pas lieu à un vote : débats, questions au Gouvernement et discussions générales y figurent aussi. Un astérisque signale un lien vers la fiche reconstitué à partir du libellé, l'Assemblée ne renseignant pas toujours le dossier concerné.</p>
  </div>;
}

function TableauAmendements({texteRef}){
  const [ouvert,setOuvert]=useState(false);
  const [etat,setEtat]=useState("idle");
  const [amdts,setAmdts]=useState([]);
  const [filtreGroupe,setFiltreGroupe]=useState("");
  const [filtreSort,setFiltreSort]=useState("");
  const [tri,setTri]=useState({col:"num",asc:true});
  const [recherche,setRecherche]=useState("");

  async function charger(){
    setEtat("load");
    try{
      const res=await fetch("public/amendements/"+texteRef+".json?t="+Date.now());
      const j=await res.json();
      setAmdts(j.amendements||[]);
      setEtat("ok");
    }catch(e){setEtat("err");}
  }
  function toggle(){
    if(!ouvert&&etat==="idle")charger();
    setOuvert(!ouvert);
  }
  const groupes=[...new Set(amdts.map(a=>a.groupe))];
  const sorts=[...new Set(amdts.map(a=>a.sort))];
  let filtres=amdts.filter(a=>
    (!filtreGroupe||a.groupe===filtreGroupe)&&
    (!filtreSort||a.sort===filtreSort)&&
    (!recherche||(a.objet||"").toLowerCase().includes(recherche.toLowerCase())||(a.num||"").toLowerCase().includes(recherche.toLowerCase()))
  );
  filtres.sort((a,b)=>{const v=(a[tri.col]||"")>(b[tri.col]||"")?1:-1;return tri.asc?v:-v;});
  const Th=({col,label})=><th onClick={()=>setTri({col,asc:tri.col===col?!tri.asc:true})} style={{padding:"6px 8px",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap"}}>{label}{tri.col===col?(tri.asc?" ▲":" ▼"):""}</th>;
  const selStyle={fontSize:12.5,padding:"5px 8px",borderRadius:6,border:"1px solid #d8d2c4",background:"#fff"};

  return <div style={{marginTop:6}}>
    <button onClick={toggle} style={{fontSize:13,fontWeight:600,color:"#1f3d6b",background:"#eef1f6",border:"1px solid #d5deec",borderRadius:8,padding:"8px 14px",cursor:"pointer"}}>
      {ouvert?"▼":"▶"} Voir tous les amendements
    </button>
    {ouvert&&<div style={{marginTop:12}}>
      {etat==="load"&&<p style={{fontSize:13,color:"#666"}}>Chargement…</p>}
      {etat==="err"&&<p style={{fontSize:13,color:"#c0392b"}}>Détail indisponible pour ce texte.</p>}
      {etat==="ok"&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          <input value={recherche} onChange={e=>setRecherche(e.target.value)} placeholder="Rechercher…" style={{...selStyle,flex:"1 1 160px"}}/>
          <select value={filtreGroupe} onChange={e=>setFiltreGroupe(e.target.value)} style={selStyle}><option value="">Tous groupes</option>{groupes.map(g=><option key={g} value={g}>{G(g).court}</option>)}</select>
          <select value={filtreSort} onChange={e=>setFiltreSort(e.target.value)} style={selStyle}><option value="">Tous sorts</option>{sorts.map(s=><option key={s} value={s}>{s}</option>)}</select>
        </div>
        <div style={{fontSize:11.5,color:"#999",marginBottom:6}}>{filtres.length} amendement{filtres.length>1?"s":""}</div>
        <div style={{overflowX:"auto",maxHeight:400,overflowY:"auto",border:"1px solid #e6e1d6",borderRadius:8}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead style={{position:"sticky",top:0,background:"#f4f1ea"}}><tr style={{textAlign:"left",color:"#777",borderBottom:"1px solid #e2dcd0"}}>
              <Th col="num" label="N°"/><Th col="groupe" label="Groupe"/><Th col="sort" label="Sort"/><Th col="organe" label="Examen"/><th style={{padding:"6px 8px"}}>Objet</th>
            </tr></thead>
            <tbody>{filtres.map((a,i)=><tr key={i} style={{borderBottom:"1px solid #f0ece3"}}>
              <td style={{padding:"5px 8px",fontWeight:600,whiteSpace:"nowrap"}}>{a.num}</td>
              <td style={{padding:"5px 8px",whiteSpace:"nowrap"}}><span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:G(a.groupe).couleur,marginRight:5}}></span>{G(a.groupe).court}</td>
              <td style={{padding:"5px 8px",whiteSpace:"nowrap",color:a.sort.toLowerCase().startsWith("adopt")?"#1a7a3a":"#555"}}>{a.sort}</td>
              <td style={{padding:"5px 8px",whiteSpace:"nowrap",color:"#888"}}>{a.organe}</td>
              <td style={{padding:"5px 8px",color:"#444",minWidth:200}}><ObjetTexte texte={a.objet} num={a.num} groupe={a.groupe} apercu={120}/></td>
            </tr>)}</tbody>
          </table>
        </div>
      </>}
    </div>}
  </div>;
}

function DescriptionTexte({d}){
  const [ouvert,setOuvert]=useState(false);
  if(!d||(!d.resume&&(!d.articles||d.articles.length===0))) return null;
  const arts=d.articles||[];
  const SEUIL=4;
  const visibles=ouvert?arts:arts.slice(0,SEUIL);
  const reste=arts.length-SEUIL;
  const source=d.source==="SN"?"Sénat":"Assemblée nationale";
  return <section style={{marginTop:26}}>
    <h3 style={{fontFamily:"Georgia,serif",fontSize:17,color:"#1a1a2e",margin:"0 0 14px",paddingBottom:8,borderBottom:"2px solid #1f3d6b"}}>Objet du texte</h3>
    {d.resume&&<p style={{fontSize:14.5,lineHeight:1.55,color:"#2a2a3a",margin:"0 0 14px",fontStyle:"italic"}}>« {d.resume} »</p>}
    {arts.length>0&&<>
      <div style={{fontSize:12.5,fontWeight:600,color:"#555",marginBottom:8}}>Ce que prévoit le texte</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {visibles.map((a,i)=><div key={i} style={{borderLeft:"3px solid #1f3d6b",padding:"7px 13px",background:"#fff",borderRadius:"0 6px 6px 0",fontSize:13,lineHeight:1.55,color:"#333"}}>{a}</div>)}
      </div>
      {reste>0&&<button onClick={()=>setOuvert(o=>!o)} style={{marginTop:10,background:"#f0ece3",border:"1px solid #e2dcd0",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,color:"#1f3d6b",fontWeight:600,fontFamily:"inherit"}}>{ouvert?"▲ Réduire":"▼ Voir les "+reste+" article"+(reste>1?"s":"")+" suivant"+(reste>1?"s":"")}</button>}
    </>}
    {d.url&&<div style={{marginTop:12,fontSize:11.5,color:"#9a9488"}}>Résumé issu de l'exposé des motifs (open data {source}) · <a href={d.url} target="_blank" rel="noopener noreferrer" style={{color:"#1f3d6b"}}>texte intégral</a></div>}
  </section>;
}

function Fiche({t,onClose,onOuvrirActeur,onOuvrirGroupe}){
  const totaux=useMemo(()=>{
    if(!t.votesParGroupe)return null;
    const s={pour:0,contre:0,abstention:0};
    Object.values(t.votesParGroupe).forEach(v=>{s.pour+=v.pour;s.contre+=v.contre;s.abstention+=v.abstention;});
    return s;
  },[t]);
  const dossierURL="https://www.assemblee-nationale.fr/dyn/17/dossiers/"+t.ref;
  const Section=({titre,children})=><section style={{marginTop:26}}><h3 style={{fontFamily:"Georgia,serif",fontSize:17,color:"#1a1a2e",margin:"0 0 14px",paddingBottom:8,borderBottom:"2px solid #1f3d6b"}}>{titre}</h3>{children}</section>;

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,20,35,0.55)",zIndex:50,display:"flex",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fdfcf9",borderRadius:14,maxWidth:760,width:"100%",height:"fit-content",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",overflow:"hidden"}}>
      <div style={{background:"linear-gradient(135deg,#1f3d6b 0%,#16294a 100%)",color:"#fff",padding:"22px 28px",position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,width:32,height:32,color:"#fff",cursor:"pointer",fontSize:16}}>✕</button>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          <span style={{fontSize:12,background:"rgba(255,196,0,0.2)",color:"#ffc400",padding:"3px 9px",borderRadius:5,fontWeight:600}}>{t.type}</span>
          <span style={{fontSize:12,background:"rgba(255,255,255,0.12)",padding:"3px 9px",borderRadius:5}}>{t.contexte}</span>
        </div>
        <h2 style={{fontFamily:"Georgia,serif",fontSize:21,lineHeight:1.3,paddingRight:40}}>{t.titre}</h2>
        {t.auteur&&<div style={{marginTop:8,fontSize:13.5}}>Auteur : {t.auteurActeurRef?<button onClick={()=>onOuvrirActeur&&onOuvrirActeur(t.auteurActeurRef)} style={{background:"none",border:"none",padding:0,cursor:"pointer",color:"#ffc400",fontWeight:700,fontSize:13.5,textDecoration:"underline",fontFamily:"inherit"}}>{t.auteur}</button>:<strong>{t.auteur}</strong>}{auteurLibelle(t)&&<span style={{opacity:0.8}}> · {auteurLibelle(t)}</span>}</div>}
        <div style={{marginTop:10,fontSize:13,opacity:0.85}}>📅 {frDate(t.date)} · 🆔 {t.ref}</div>
      </div>
      <div style={{padding:"8px 28px 32px"}}>
        <DescriptionTexte d={t.description}/>
        {t.cycle&&t.cycle.length>0&&<Section titre="Cycle législatif">
          <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            {t.cycle.map((e,i)=><React.Fragment key={i}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:70}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:e.etat==="fait"?"#1f3d6b":"#e8e4da",color:e.etat==="fait"?"#fff":"#8a8478",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12}}>{e.etat==="fait"?"✓":i+1}</div>
                <span style={{fontSize:10.5,textAlign:"center",color:e.etat==="fait"?"#1a1a2e":"#8a8478",lineHeight:1.2,maxWidth:80}}>{e.label}</span>
              </div>
              {i<t.cycle.length-1&&<div style={{width:16,height:2,background:"#d8d2c4"}}/>}

          {totaux?<>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",borderRadius:8,overflow:"hidden",border:"1px solid #e2dcd0",flex:"1 1 280px",minWidth:260}}>
                {[["Pour",totaux.pour,"#1a7a3a"],["Contre",totaux.contre,"#c0392b"],["Abst.",totaux.abstention,"#b8860b"]].map(([n,v,c],i)=><div key={i} style={{flex:1,textAlign:"center",padding:"10px 6px",background:"#fff"}}><div style={{fontSize:22,fontWeight:700,color:c,fontFamily:"Georgia,serif"}}>{v}</div><div style={{fontSize:12,color:"#777"}}>{n}</div></div>)}

                <div style={{marginTop:9}}><BarreVotes v={v}/></div>
              </div>;

        {t.votesParGroupe&&<VotesNominatifs texteRef={t.ref} onOuvrirActeur={onOuvrirActeur}/>}

          </div>
          {t.amendements.listeAdoptes&&t.amendements.listeAdoptes.length>0&&<div style={{marginBottom:14}}>
            <div style={{fontSize:12.5,fontWeight:600,color:"#555",marginBottom:8}}>Amendements adoptés</div>
            {t.amendements.listeAdoptes.map((a,i)=><div key={i} style={{borderLeft:"3px solid "+G(a.groupe).couleur,padding:"6px 12px",marginBottom:6,background:"#fff",borderRadius:"0 6px 6px 0"}}><div style={{fontSize:12.5,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><strong>{a.num}</strong> <span style={{color:"#888"}}>· {G(a.groupe).court}</span><span style={{fontSize:10.5,padding:"1px 7px",borderRadius:4,background:"#e6f4ea",color:"#1a7a3a",fontWeight:600}}>{a.sort}</span></div><div style={{fontSize:12.5,color:"#444",marginTop:2}}><ObjetTexte texte={a.objet} num={a.num} groupe={a.groupe}/></div></div>)}
          </div>}
          <TableauAmendements texteRef={t.ref}/>
        </Section>}
        <a href={dossierURL} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:24,fontSize:13,color:"#1f3d6b",fontWeight:600,textDecoration:"none"}}>↗ Dossier officiel sur assemblee-nationale.fr ({t.ref})</a>
      </div>
    </div>
  </div>;
}

function Calendrier({mois,setMois,onJour,jourActif,jours,joursSeance}){
  const a=mois.getFullYear(),m=mois.getMonth();
  const dec=(new Date(a,m,1).getDay()+6)%7,nbj=new Date(a,m+1,0).getDate();
  const cases=[];for(let i=0;i<dec;i++)cases.push(null);for(let d=1;d<=nbj;d++)cases.push(d);
  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <button onClick={()=>setMois(new Date(a,m-1,1))} style={navBtn}>‹</button>
      <h2 style={{fontFamily:"Georgia,serif",fontSize:20,textTransform:"capitalize"}}>{MOIS[m]} {a}</h2>
      <button onClick={()=>setMois(new Date(a,m+1,1))} style={navBtn}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
      {JOURS.map((j,i)=><div key={i} style={{textAlign:"center",fontSize:12,fontWeight:600,color:"#999",paddingBottom:4}}>{j}</div>)}
      {cases.map((d,i)=>{if(d===null)return <div key={i}/>;
        const iso=ymd(new Date(a,m,d));const n=jours[iso]||0;
        const seance=joursSeance&&joursSeance.has(iso);
        const act=n>0||seance;const sel=iso===jourActif;
        return <button key={i} onClick={()=>act&&onJour(iso)} disabled={!act} style={{aspectRatio:"1",border:sel?"2px solid #1f3d6b":act?"1px solid #1f3d6b":"1px solid transparent",borderRadius:10,background:sel?"#eef1f6":act?"#fff":"transparent",cursor:act?"pointer":"default",position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:14,color:act?"#1a1a2e":"#c4bfb4",fontWeight:act||sel?600:400}}>
          {d}<span style={{position:"absolute",bottom:6,display:"flex",gap:2}}>
            {n>0?Array.from({length:Math.min(n,3)}).map((_,k)=><span key={k} style={{width:4,height:4,borderRadius:"50%",background:"#ffc400"}}/>)
                :(seance?<span style={{width:4,height:4,borderRadius:"50%",background:"#c4bfb4"}}/>:null)}
          </span>
        </button>;
      })}
    </div>
    <div style={{fontSize:11.5,color:"#999",marginTop:14,lineHeight:1.7}}>
      <span style={{display:"inline-flex",alignItems:"center",gap:5,marginRight:12}}><span style={{width:5,height:5,borderRadius:"50%",background:"#ffc400",display:"inline-block"}}></span> texte voté</span>
      <span style={{display:"inline-flex",alignItems:"center",gap:5}}><span style={{width:5,height:5,borderRadius:"50%",background:"#c4bfb4",display:"inline-block"}}></span> séance (sans vote ou à venir)</span>
    </div>
  </div>;
}

function Recherche({textes,onOuvrir}){
  const [q,setQ]=useState("");
  const [fType,setFType]=useState("");
  const [fGroupe,setFGroupe]=useState("");
  const [fStatut,setFStatut]=useState("");
  const [fRef,setFRef]=useState("");
  const groupes=[...new Set(textes.map(t=>t.auteurGroupe).filter(Boolean))];
  const types=[...new Set(textes.map(t=>t.type).filter(Boolean))].sort();
  const res=textes.filter(t=>
    (!q||t.titre.toLowerCase().includes(q.toLowerCase())||(t.auteur||"").toLowerCase().includes(q.toLowerCase()))&&
    (!fType||t.type===fType)&&
    (!fGroupe||t.auteurGroupe===fGroupe)&&
    (!fStatut||t.statut===fStatut)&&
    (!fRef||(t.ref||"").toLowerCase().includes(fRef.toLowerCase()))
  ).sort((a,b)=>b.date.localeCompare(a.date));
  const sel={fontSize:13,padding:"8px 10px",borderRadius:8,border:"1px solid #d8d2c4",background:"#fff"};
  const actif=q||fType||fGroupe||fStatut||fRef;
  return <div>
    <div style={{background:"#fdfcf9",borderRadius:14,padding:20,border:"1px solid #e6e1d6",marginBottom:20}}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher dans le titre ou l'auteur…" style={{...sel,width:"100%",fontSize:14,marginBottom:10}}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <select value={fType} onChange={e=>setFType(e.target.value)} style={sel}><option value="">Tous types</option>{types.map(x=><option key={x} value={x}>{x}</option>)}</select>
        <select value={fGroupe} onChange={e=>setFGroupe(e.target.value)} style={sel}><option value="">Tous partis (auteur)</option>{groupes.map(g=><option key={g} value={g}>{G(g).court}</option>)}</select>
        <select value={fStatut} onChange={e=>setFStatut(e.target.value)} style={sel}><option value="">Tous statuts</option><option value="adopté">Adopté</option><option value="rejeté">Rejeté</option></select>
        <input value={fRef} onChange={e=>setFRef(e.target.value)} placeholder="N° dossier (DLR…)" style={{...sel,flex:"1 1 140px"}}/>
        {actif&&<button onClick={()=>{setQ("");setFType("");setFGroupe("");setFStatut("");setFRef("");}} style={{...sel,cursor:"pointer",color:"#c0392b",background:"#fbeaea",border:"1px solid #f0d9d9"}}>✕ Réinitialiser</button>}
      </div>
    </div>
    <div style={{fontSize:12.5,color:"#999",marginBottom:12}}>{res.length} texte{res.length>1?"s":""} trouvé{res.length>1?"s":""}</div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {res.map((t,i)=>{const ad=t.statut==="adopté",rej=t.statut==="rejeté";
        return <button key={i} onClick={()=>onOuvrir(t)} style={{textAlign:"left",background:"#fdfcf9",border:"1px solid #e6e1d6",borderRadius:12,padding:16,cursor:"pointer"}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
            <span style={{fontSize:11,background:"#eef1f6",color:"#1f3d6b",padding:"2px 8px",borderRadius:5,fontWeight:600}}>{t.type}</span>
            {t.statut&&t.statut!=="—"&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:5,fontWeight:600,background:ad?"#e6f4ea":rej?"#fbeaea":"#fff6e5",color:ad?"#1a7a3a":rej?"#c0392b":"#b8860b",textTransform:"capitalize"}}>{t.statut}</span>}
            <span style={{fontSize:11,color:"#aaa"}}>{frDate(t.date)}</span>
          </div>
          <div style={{fontFamily:"Georgia,serif",fontSize:15.5,lineHeight:1.3}}>{t.titre}</div>
          {t.auteur&&<div style={{marginTop:5,fontSize:12,color:"#666"}}><span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:auteurCouleur(t),marginRight:5}}></span>{t.auteur}{auteurLibelle(t)?" · "+auteurLibelle(t):""}</div>}
          <div style={{marginTop:5,fontSize:11.5,color:"#aaa"}}>{t.ref}</div>
        </button>;
      })}
    </div>
  </div>;
}

function App(){
  const [data,setData]=useState(null);
  const [etat,setEtat]=useState("load");
  const [mois,setMois]=useState(new Date());
  const [jour,setJour]=useState(null);
  const [fiche,setFiche]=useState(null);
  const [acteur,setActeur]=useState(null);
  const [groupe,setGroupe]=useState(null);
  const [agenda,setAgenda]=useState(null);
  const [vue,setVue]=useState("calendrier");
  // Navigation par adresse : #texte/DLR… ou #depute/PA… -> liens partageables
  const allerTexte=(ref)=>{window.location.hash="texte/"+ref;};
  const allerActeur=(ref)=>{window.location.hash="depute/"+ref;};
  const allerGroupe=(code)=>{window.location.hash="groupe/"+code;};
  const fermer=()=>{
    if(window.location.hash) window.history.back();
    else {setFiche(null);setActeur(null);}
  };

  async function charger(){
    setEtat("load");
    try{
      const res=await fetch(DATA_URL+"?t="+Date.now());
      const j=await res.json();
      setData(j);
      fetch("public/agenda.json?t="+Date.now()).then(r=>r.json()).then(a=>setAgenda(a)).catch(()=>{});
      if(j.textes&&j.textes.length){const [y,m]=j.textes[j.textes.length-1].date.split("-").map(Number);setMois(new Date(y,m-1,1));}
      setEtat("ok");
    }catch(e){setEtat("err");}
  }
  useEffect(()=>{charger();},[]);

  const BASE=(data&&data.textes)||[];

  useEffect(()=>{
    if(etat!=="ok") return;
    const appliquer=()=>{
      const h=(window.location.hash||"").replace(/^#/,"");
      if(h.startsWith("texte/")){
        const t=(data&&data.textes||[]).find(x=>x.ref===h.slice(6));
        setActeur(null); setGroupe(null); setFiche(t||null);
      } else if(h.startsWith("depute/")){
        setFiche(null); setGroupe(null); setActeur(h.slice(7));
      } else if(h.startsWith("groupe/")){
        setFiche(null); setActeur(null); setGroupe(h.slice(7));
      } else { setFiche(null); setActeur(null); setGroupe(null); }
    };
    appliquer();
    window.addEventListener("hashchange",appliquer);
    return ()=>window.removeEventListener("hashchange",appliquer);
  },[etat,data]);
  const jours={};BASE.forEach(t=>{jours[t.date]=(jours[t.date]||0)+1;});
  const joursSeance=useMemo(()=>new Set(agenda?Object.keys(agenda.jours||{}):[]),[agenda]);
  const refsConnues=useMemo(()=>new Set(BASE.map(t=>t.ref)),[data]);
  const textesDuJour=jour?BASE.filter(t=>t.date===jour):[];
  const dates=[...new Set(BASE.map(t=>t.date))].sort().reverse();

  return <div style={{minHeight:"100vh"}}>
    <header style={{background:"linear-gradient(135deg,#16294a 0%,#1f3d6b 100%)",color:"#fff",padding:"24px 20px"}}>
      <div style={{maxWidth:1000,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:6,height:40,background:"#ffc400",borderRadius:3}}/>
            <div><h1 style={{fontFamily:"Georgia,serif",fontSize:26}}>Hémicycle</h1><p style={{fontSize:13.5,opacity:0.8,marginTop:2}}>Suivi des textes votés à l'Assemblée nationale</p></div>
          </div>
          <button onClick={charger} style={{background:"rgba(255,255,255,0.15)",color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>↻ Recharger</button>
        </div>
        <div style={{marginTop:16,display:"flex",gap:8}}>
          <button onClick={()=>setVue("calendrier")} style={{background:vue==="calendrier"?"#ffc400":"rgba(255,255,255,0.12)",color:vue==="calendrier"?"#1a1a2e":"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13.5,fontWeight:600,cursor:"pointer"}}>🗓 Calendrier</button>
          <button onClick={()=>setVue("recherche")} style={{background:vue==="recherche"?"#ffc400":"rgba(255,255,255,0.12)",color:vue==="recherche"?"#1a1a2e":"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13.5,fontWeight:600,cursor:"pointer"}}>🔍 Recherche</button>
          <button onClick={()=>setVue("stats")} style={{background:vue==="stats"?"#ffc400":"rgba(255,255,255,0.12)",color:vue==="stats"?"#1a1a2e":"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13.5,fontWeight:600,cursor:"pointer"}}>📊 Stats</button>
          <button onClick={()=>setVue("deputes")} style={{background:vue==="deputes"?"#ffc400":"rgba(255,255,255,0.12)",color:vue==="deputes"?"#1a1a2e":"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13.5,fontWeight:600,cursor:"pointer"}}>🗺 Vos députés</button>
        </div>
        {etat==="ok"&&data&&<div style={{marginTop:16,display:"inline-block",background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 14px",fontSize:12.5}}>▤ {data.nb_textes} textes · {data.source} · générées le {data.genere_le?new Date(data.genere_le).toLocaleDateString("fr-FR"):"?"}</div>}
      </div>
    </header>

    {etat==="load"&&<div style={{padding:"80px 0",textAlign:"center",color:"#666"}}><div className="spin" style={{width:30,height:30,border:"3px solid #ddd",borderTopColor:"#1f3d6b",borderRadius:"50%",margin:"0 auto 14px"}}/>Chargement des données…</div>}
    {etat==="err"&&<div style={{maxWidth:560,margin:"60px auto",padding:20,background:"#fff6e5",border:"1px solid #f0d9a8",borderRadius:10,color:"#7a5c10",fontSize:13.5,lineHeight:1.6}}>⚠ Impossible de charger <code>public/data.json</code>. Vérifiez que le fichier existe bien dans le dépôt et que GitHub Pages est activé, puis cliquez « Recharger ».</div>}

    {etat==="ok"&&vue==="recherche"&&<main style={{maxWidth:900,margin:"0 auto",padding:"28px 20px"}}>
      <Recherche textes={BASE} onOuvrir={(t)=>allerTexte(t.ref)}/>
    </main>}

    {etat==="ok"&&vue==="deputes"&&<main style={{maxWidth:1040,margin:"0 auto",padding:"28px 20px"}}>
      <Territoires onOuvrirActeur={allerActeur} onOuvrirGroupe={allerGroupe}/>
    </main>}

    {etat==="ok"&&vue==="stats"&&<main style={{maxWidth:960,margin:"0 auto",padding:"28px 20px"}}>
      <Stats textes={BASE} depots={data&&data.depotsParGroupe} onOuvrirTexte={allerTexte} onOuvrirGroupe={allerGroupe}/>
    </main>}

    {etat==="ok"&&vue==="calendrier"&&<main className="layout" style={{maxWidth:1000,margin:"0 auto",padding:"28px 20px",display:"grid",gridTemplateColumns:"minmax(300px,380px) 1fr",gap:28,alignItems:"start"}}>
      <div className="cal-col" style={{background:"#fdfcf9",borderRadius:14,padding:22,border:"1px solid #e6e1d6",position:"sticky",top:20}}>
        <Calendrier mois={mois} setMois={setMois} onJour={setJour} jourActif={jour} jours={jours} joursSeance={joursSeance}/>
      </div>
      <div>
        {!jour?<div style={{background:"#fdfcf9",borderRadius:14,padding:"40px 28px",border:"1px dashed #d8d2c4"}}>
          <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:30,marginBottom:8}}>🗓</div><h3 style={{fontFamily:"Georgia,serif",fontSize:18,marginBottom:6}}>Choisissez une date</h3><p style={{fontSize:14,color:"#777",lineHeight:1.5}}>Cliquez sur un jour marqué du calendrier, ou dans la liste ci-dessous.</p></div>
          <div style={{borderTop:"1px solid #eee",paddingTop:18}}>
            <div style={{fontSize:11.5,color:"#999",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Séances de la base</div>
            {dates.map(dt=><button key={dt} onClick={()=>setJour(dt)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",textAlign:"left",background:"none",border:"none",borderBottom:"1px solid #f3f0e8",padding:"9px 0",fontSize:13.5,color:"#1f3d6b",cursor:"pointer",fontWeight:500}}><span>{frDate(dt)}</span><span style={{fontSize:12,color:"#999"}}>{jours[dt]} texte{jours[dt]>1?"s":""} →</span></button>)}
          </div>
        </div>:<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><h2 style={{fontFamily:"Georgia,serif",fontSize:19}}>{frDate(jour)}<span style={{fontSize:14,fontWeight:400,color:"#888",marginLeft:8}}>{textesDuJour.length>0?`· ${textesDuJour.length} texte${textesDuJour.length>1?"s":""} voté${textesDuJour.length>1?"s":""}`:(jour>ymd(new Date())?"· séance à venir":"· séance sans vote")}</span></h2><button onClick={()=>setJour(null)} style={{...navBtn,width:"auto",padding:"0 12px",fontSize:13}}>✕ Fermer</button></div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {textesDuJour.map((t,i)=>{const ad=t.statut==="adopté",rej=t.statut==="rejeté";
              return <button key={i} onClick={()=>allerTexte(t.ref)} style={{textAlign:"left",background:"#fdfcf9",border:"1px solid #e6e1d6",borderRadius:12,padding:18,cursor:"pointer"}}>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                  <span style={{fontSize:11.5,background:"#eef1f6",color:"#1f3d6b",padding:"3px 9px",borderRadius:5,fontWeight:600}}>{t.type}</span>
                  {t.statut&&t.statut!=="—"&&<span style={{fontSize:11.5,padding:"3px 9px",borderRadius:5,fontWeight:600,background:ad?"#e6f4ea":rej?"#fbeaea":"#fff6e5",color:ad?"#1a7a3a":rej?"#c0392b":"#b8860b",textTransform:"capitalize"}}>{t.statut}</span>}
                  {t.votesParGroupe?<span style={{fontSize:11.5,padding:"3px 9px",borderRadius:5,fontWeight:600,background:"#eef6f0",color:"#1a7a3a"}}>vote détaillé ✓</span>:<span style={{fontSize:11.5,padding:"3px 9px",borderRadius:5,fontWeight:600,background:"#f2efe8",color:"#8a8478"}}>à main levée</span>}
                </div>
                <h3 style={{fontFamily:"Georgia,serif",fontSize:16.5,lineHeight:1.35}}>{t.titre}</h3>
                {t.auteur&&<div style={{marginTop:6,fontSize:12.5,color:"#555",display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:auteurCouleur(t)}}></span>{t.auteur}{auteurLibelle(t)&&<span style={{color:"#999"}}>· {auteurLibelle(t)}</span>}</div>}
                <div style={{marginTop:8,fontSize:12.5,color:"#888"}}>🔍 {t.ref} · cliquer pour le détail</div>
              </button>;
            })}
          </div>
          {agenda&&agenda.jours&&agenda.jours[jour]&&
            <OrdreDuJour seances={agenda.jours[jour]} onOuvrirTexte={allerTexte} textesConnus={refsConnues} futur={jour>ymd(new Date())}/>}
        </div>}
      </div>
    </main>}

    <footer style={{maxWidth:1000,margin:"0 auto",padding:"8px 20px 40px",fontSize:11.5,color:"#aaa",lineHeight:1.5}}>Données réelles issues de l'open data de l'Assemblée nationale. Résultats et votes par groupe : données officielles. Ce site se met à jour automatiquement quand la base est rafraîchie.</footer>

    {fiche&&<Fiche t={fiche} onClose={fermer} onOuvrirActeur={allerActeur} onOuvrirGroupe={allerGroupe}/>}
    {acteur&&<FicheActeur acteurRef={acteur} onClose={fermer} onOuvrirTexte={allerTexte} onOuvrirGroupe={allerGroupe}/>}
    {groupe&&<FicheGroupe code={groupe} onClose={fermer} onOuvrirTexte={allerTexte} onOuvrirActeur={allerActeur} onOuvrirGroupe={allerGroupe}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
